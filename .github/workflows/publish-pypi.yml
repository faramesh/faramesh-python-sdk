name: Publish Python SDK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/faramesh-sdk/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag/version match
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('pyproject.toml').read_text(encoding='utf-8')
          m = re.search(r'^version\s*=\s*"([^"]+)"', text, flags=re.MULTILINE)
          if not m:
            raise SystemExit('version not found in pyproject.toml')
          print(m.group(1))
          PY
          )
          if [[ "$TAG_VERSION" != "$PKG_VERSION" ]]; then
            echo "tag version ($TAG_VERSION) does not match package version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify wheel bootstrap import
        run: |
          python -m venv /tmp/faramesh-sdk-wheel-check
          /tmp/faramesh-sdk-wheel-check/bin/python -m pip install --upgrade pip
          /tmp/faramesh-sdk-wheel-check/bin/python -m pip install dist/*.whl
          /tmp/faramesh-sdk-wheel-check/bin/python - <<'PY'
          import importlib.util
          from faramesh.client import __version__

          assert importlib.util.find_spec('faramesh.autopatch') is not None, 'missing faramesh.autopatch'
          import faramesh.autopatch  # noqa: F401
          print('publish wheel version:', __version__)
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          print-hash: true
